name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  core-clj:
    name: "core: JDK ${{ matrix.jdk }} / ${{ matrix.clojure }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        jdk: ['8', '11', '17', '21']
        clojure: ['clojure-1-10', 'clojure-1-11', 'clojure-1-12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.jdk }}
      - uses: DeLaGuardo/setup-clojure@13.4
        with:
          lein: 2.12.0
      - uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: m2-${{ hashFiles('**/project.clj') }}
          restore-keys: m2-
      - run: lein with-profile +${{ matrix.clojure }} test
        working-directory: environ

  core-cljs-node:
    name: "core: ClojureScript (Node)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: DeLaGuardo/setup-clojure@13.4
        with:
          lein: 2.12.0
      - uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: m2-${{ hashFiles('**/project.clj') }}
          restore-keys: m2-
      - run: lein doo node test-nodejs once
        working-directory: environ

  lein-environ:
    name: "lein-environ plugin"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: DeLaGuardo/setup-clojure@13.4
        with:
          lein: 2.12.0
      - uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: m2-${{ hashFiles('**/project.clj') }}
          restore-keys: m2-
      - run: lein test
        working-directory: lein-environ
