name: release

# Publishes to Clojars when a v* tag is pushed. The tag is the deliberate
# "this is worth a release" signal; nothing publishes on ordinary commits.
# Two artifacts live here (environ + lein-environ) with independent versions,
# so each is deployed only when its project.clj version is not yet on Clojars:
# a lib-only bump, a plugin-only bump, and re-running the same tag are all
# idempotent and stay green instead of 403-ing on a redeploy.
on:
  push:
    tags: ['v*']
  workflow_dispatch: {}   # manual run for testing

permissions:
  contents: write          # create the GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: DeLaGuardo/setup-clojure@13.6.1
        with:
          lein: 2.12.0
      - uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/project.clj') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Verify README install coordinates match versions
        if: github.ref_type == 'tag'
        run: |
          check () {
            local artifact="$1" dir="$2" ver lib
            ver=$(sed -n '1s/[^"]*"\([0-9][^"]*\)".*/\1/p' "$dir/project.clj")
            lib="net.clojars.savya/$artifact"
            if ! sed 's/  */ /g' README.md | grep -qF "[$lib \"$ver\"]"; then
              echo "::error::README.md is missing install coordinate: [$lib \"$ver\"]"
              exit 1
            fi
          }
          check environ      environ
          check lein-environ lein-environ

      - name: Test
        run: |
          (cd environ && lein test)
          (cd lein-environ && lein test)

      - name: Deploy to Clojars (idempotent per artifact)
        env:
          # lein resolves :env/clojars_username / :env/clojars_password from these
          CLOJARS_USERNAME: ${{ secrets.CLOJARS_USERNAME }}
          CLOJARS_PASSWORD: ${{ secrets.CLOJARS_PASSWORD }}
        run: |
          set -euo pipefail

          deploy_if_new () {
            local artifact="$1" dir="$2" ver url code
            ver=$(sed -n '1s/[^"]*"\([0-9][^"]*\)".*/\1/p' "$dir/project.clj")
            url="https://repo.clojars.org/net/clojars/savya/${artifact}/${ver}/${artifact}-${ver}.jar"
            code=$(curl -fsS -o /dev/null -w '%{http_code}' "$url" || true)
            if [ "$code" = "200" ]; then
              echo "::notice::${artifact} ${ver} already on Clojars; skipping"
            else
              echo "Deploying ${artifact} ${ver} (Clojars returned ${code})"
              (cd "$dir" && lein deploy clojars)
            fi
          }

          deploy_if_new environ      environ
          deploy_if_new lein-environ lein-environ

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
